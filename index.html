<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Releases</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }
        .release {
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f9f9f9;
            position: relative;
        }
        .repo-name {
            font-size: 1.5em;
            font-weight: bold;
            display: inline-block;
        }
        .latest-tag {
            background: #007bff;
            color: white;
            padding: 3px 8px;
            font-size: 0.8em;
            border-radius: 5px;
            margin-left: 10px;
        }
        .release-date {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.9em;
            color: #555;
        }
        .assets ul {
            padding-left: 20px;
        }
        .expandable {
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }
        .hidden {
            display: none;
        }
        .markdown-content {
            padding: 10px;
            background: #f3f3f3;
            border-radius: 5px;
        }
        .markdown-content pre {
            background: #272822;
            color: white;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .markdown-content code {
            background: #f4f4f4;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="latest-release">Loading...</div>

    <h2 id="older-releases-header">Older Releases</h2>
    <div id="older-releases"></div>

    <script>
        function getRepoDetails() {
            const parts = window.location.hostname.split(".");
            if (parts.length >= 3 && parts[1] === "github" && parts[2] === "io") {
                const owner = parts[0];
                const repo = window.location.pathname.split("/")[1];
                return { owner, repo };
            }
            return null;
        }

        function fetchReleases() {
            const repoDetails = getRepoDetails();
            if (!repoDetails) {
                document.getElementById("latest-release").innerText = "Could not determine repository details.";
                return;
            }

            const { owner, repo } = repoDetails;
            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/releases`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(releases => {
                    if (!Array.isArray(releases) || releases.length === 0) {
                        document.getElementById("latest-release").innerText = "No releases found.";
                        document.getElementById("older-releases-header").style.display = "none";
                        return;
                    }

                    const latest = releases[0];
                    document.getElementById("latest-release").innerHTML = formatReleaseHTML(latest, repo, true);

                    if (releases.length > 1) {
                        document.getElementById("older-releases").innerHTML = `
                            <p class="expandable" onclick="toggleOlderReleases()">Show older releases ▼</p>
                            <div id="older-releases-container" class="hidden">
                                ${releases.slice(1).map(release => formatReleaseHTML(release, repo, false)).join("")}
                            </div>`;
                    } else {
                        document.getElementById("older-releases").innerHTML = "<p>No older releases available.</p>";
                    }
                })
                .catch(error => {
                    document.getElementById("latest-release").innerText = "Failed to load releases.";
                });
        }

        function formatReleaseHTML(release, repo, isLatest) {
            const releaseDate = new Date(release.published_at);
            const relativeTime = getRelativeTime(releaseDate);
            const tagHTML = isLatest ? `<span class="latest-tag">Latest Release</span>` : "";

            return `<div class="release">
                <div class="repo-name">${repo}</div> ${tagHTML}
                <span class="release-date">${releaseDate.toLocaleDateString()} (${relativeTime})</span>
                <div class="markdown-content">${renderMarkdown(release.body) || "<p>No description available.</p>"}</div>
                <div class="assets">
                    <h4>Assets:</h4>
                    <ul>
                        ${release.assets.length > 0 ? release.assets.map(asset => `<li><a href="${asset.browser_download_url}" target="_blank">${asset.name}</a></li>`).join("") : "<li>No assets available.</li>"}
                    </ul>
                </div>
            </div>`;
        }

        function getRelativeTime(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return `${diff} sec ago`;
            if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} hr ago`;
            if (diff < 2592000) return `${Math.floor(diff / 86400)} days ago`;
            return `${Math.floor(diff / 2592000)} months ago`;
        }

        function renderMarkdown(text) {
            if (!text) return "";
            return text
                .replace(/</g, "&lt;").replace(/>/g, "&gt;") // Escape HTML
                .replace(/### (.*?)\n/g, "<h3>$1</h3>") // H3
                .replace(/## (.*?)\n/g, "<h2>$1</h2>") // H2
                .replace(/# (.*?)\n/g, "<h1>$1</h1>") // H1
                .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>") // Bold
                .replace(/\*(.*?)\*/g, "<em>$1</em>") // Italics
                .replace(/\n/g, "<br>") // Line breaks
                .replace(/\`\`\`(.*?)\n([\s\S]*?)\n\`\`\`/g, '<pre>$2</pre>') // Code blocks
                .replace(/\`([^`]+)\`/g, '<code>$1</code>') // Inline code
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>'); // Links
        }

        function toggleOlderReleases() {
            const container = document.getElementById("older-releases-container");
            const toggleText = document.querySelector(".expandable");

            if (container.classList.contains("hidden")) {
                container.classList.remove("hidden");
                toggleText.innerText = "Hide older releases ▲";
            } else {
                container.classList.add("hidden");
                toggleText.innerText = "Show older releases ▼";
            }
        }

        fetchReleases();
    </script>

</body>
</html>
